<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
    <title>cvElf — Extension Options</title>
  </head>
  <body>
    <div class="wrap">
      <div class="title">Extension Options</div>
      <div class="sub">Set where to send saved jobs.</div>

      <label class="label">Server URL</label>
      <input id="baseUrl" class="input" placeholder="http://localhost:3000" />
      <div class="hint">
        This should be your cvElf server base URL (no trailing slash).
      </div>

      <div class="row">
        <button id="save" class="btn primary">Save</button>
        <button id="test" class="btn">Test connection</button>
      </div>

      <div id="status" class="status"></div>

      <div class="hint">
        Note: for non-localhost URLs, Chrome may prompt for permission to access that server.
      </div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
